<!DOCTYPE html>
<html lang="de" class="nui-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schließfach</title>
    <style>
        html, body { margin: 0; padding: 0; background: transparent !important; }
        html.nui-hidden { display: none !important; }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="hidden">
        <!-- PIN Auth -->
        <section id="view-auth" class="panel panel-sm hidden">
            <header class="panel-header">
                <div>
                    <h1 id="auth-title">PIN eingeben</h1>
                    <p id="auth-subtitle" class="subtitle"></p>
                </div>
                <button class="btn-icon" data-close aria-label="Schließen">✕</button>
            </header>
            <div class="pin-display" id="pin-display"></div>
            <div class="pin-pad" id="pin-pad"></div>
            <div class="pin-actions">
                <button class="btn btn-ghost" id="pin-clear">Löschen</button>
                <button class="btn btn-primary" id="pin-submit">Bestätigen</button>
            </div>
            <button class="btn btn-outline btn-block" id="use-key-btn">Schlüssel verwenden</button>
            <p id="auth-message" class="message hidden"></p>
        </section>

        <!-- Locker Inventory -->
        <section id="view-locker" class="panel hidden">
            <header class="panel-header">
                <div>
                    <h1 id="locker-name">Schließfach</h1>
                    <p id="locker-desc" class="subtitle"></p>
                </div>
                <button class="btn-icon" data-close aria-label="Schließen">✕</button>
            </header>
            <div id="locker-loading" class="loading hidden">
                <div class="spinner"></div>
                <span>Laden…</span>
            </div>
            <div id="items-grid" class="items-grid"></div>
        </section>

        <!-- Admin -->
        <section id="view-admin" class="panel panel-lg hidden">
            <header class="panel-header">
                <div>
                    <h1 id="admin-title">Schließfach-Verwaltung</h1>
                    <p class="subtitle">Live-Verwaltung aller Schließfächer</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" id="admin-new">Neues Schließfach</button>
                    <button class="btn-icon" data-admin-close aria-label="Schließen">✕</button>
                </div>
            </header>
            <div class="admin-layout">
                <aside class="admin-sidebar" id="admin-locker-list"></aside>
                <main class="admin-main" id="admin-editor">
                    <div class="empty-state">Wähle ein Schließfach oder erstelle ein neues.</div>
                </main>
            </div>
        </section>
    </div>

    <div id="confirm-overlay" class="overlay hidden">
        <div class="dialog">
            <h3 id="confirm-title">Bestätigen</h3>
            <p id="confirm-text"></p>
            <div class="dialog-actions">
                <button class="btn btn-ghost" id="confirm-cancel">Abbrechen</button>
                <button class="btn btn-primary" id="confirm-ok">Ja</button>
            </div>
        </div>
    </div>

    <div id="toast-stack" class="toast-stack"></div>

    <script src="app.js"></script>
</body>
</html>
